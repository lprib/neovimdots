unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set-option -g focus-events on

setw -g mode-keys vi

set -s escape-time 0

set -g mouse on

bind h split-window -h
bind v split-window -v
unbind '"'
unbind %

# make copy mode like vim
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi V send-keys -X select-line
#bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi y send-keys -X copy-selection

set -g status-left " "
set -g status-right "%b-%e %I:%M%p "

set -g status-bg darkcyan
set -g window-status-format "#[bg=cyan] #I:#W #[default]#{?window_zoomed_flag,Z, }"
set -g window-status-current-format "#[bg=brightcyan] #I:#W #{?window_zoomed_flag,Z, }#[default]"
